<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

/* Header */

.header{
background:#ff4757;
color:white;
text-align:center;
padding:30px;
font-size:28px;
}

/* Container */

.container{
display:flex;
justify-content:center;
gap:40px;
padding:50px;
flex-wrap:wrap;
}

/* Contact Form */

.contact-form{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-form h2{
margin-bottom:20px;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;
}

.contact-form button{
width:100%;
padding:12px;
background:#ff4757;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.contact-form button:hover{
background:#e84118;
}

/* Contact Info */

.contact-info{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-info h2{
margin-bottom:20px;
}

.contact-info p{
margin:10px 0;
}

/* Social Icons */

.social{
margin-top:20px;
}

.social a{
margin-right:10px;
text-decoration:none;
font-size:20px;
}

/* Map */

.map{
width:100%;
margin-top:40px;
}

iframe{
width:100%;
height:300px;
border:none;
}

</style>
</head>

<body>

<div class="header">
Contact Our Restaurant
</div>

<div class="container">

<!-- Contact Form -->

<div class="contact-form">

<h2>Send Message</h2>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="5" placeholder="Your Message"></textarea>
<textarea rows="5" placeholder="Your Adress"></textarea>

<button>Send Message</button>

</form>

</div>

<!-- Contact Info -->

<div class="contact-info">

<h2>Contact Information</h2>

<p>📍 Location: Delhi, India</p>

<p>📞 Phone: +91 9876543210</p>

<p>✉ Email: restaurant@email.com</p>

<p>⏰ Open: 10 AM - 11 PM</p>

<div class="social">

<a href="#">🌐</a>
<a href="#">📘</a>
<a href="#">📸</a>

</div>

</div>

</div>

<!-- Google Map -->

<div class="map">

<iframe src="https://maps.google.com/maps?q=Delhi&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</div>

</body>
</html>
